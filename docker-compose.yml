version: '3.9'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geosurvey-db
    environment:
      POSTGRES_DB: geosurvey
      POSTGRES_USER: geosurvey
      POSTGRES_PASSWORD: geosurvey_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geosurvey"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: geosurvey-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geosurvey-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://geosurvey:geosurvey_secret@db:5432/geosurvey
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  scientific-engine:
    build:
      context: ./scientific-engine
      dockerfile: Dockerfile
    container_name: geosurvey-engine
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://geosurvey:geosurvey_secret@db:5432/geosurvey
    volumes:
      - ./scientific-engine:/app
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A engine.worker worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: geosurvey-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  pgdata:
  uploads:
